workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      vars:
        TTS_API_KEY: "AIzaSyBpRJzJoBWwgJCn2ORggNMvYKKLf0Y6unQ"
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-method ad-hoc \
            --dart-define=TTS_API_KEY=$TTS_API_KEY
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - seu-email@exemplo.com